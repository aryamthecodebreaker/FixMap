<svg xmlns="http://www.w3.org/2000/svg" width="860" height="641" viewBox="0 0 860 641" role="img" aria-label="Animated terminal recording: one fixmap plan command produces ranked context files, a test route, an authentication risk note, and empty-state diagnostics.">
  <style>
    text { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; font-size: 13.5px; white-space: pre; }
    .l { opacity: 0; animation: fadein 0.45s ease-out forwards; }
    .cursor { animation: blink 0.9s step-end 2, fadein 0.3s ease-out 1.8s reverse forwards; }
    @keyframes fadein { to { opacity: 1; } }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .l { animation: none; opacity: 1; } .cursor { animation: none; opacity: 0; } }
  </style>
  <rect width="860" height="641" rx="10" fill="#0d1117" stroke="#30363d"/>
  <rect width="860" height="44" rx="10" fill="#161b22"/>
  <rect y="32" width="860" height="12" fill="#161b22"/>
  <circle cx="24" cy="22" r="6" fill="#ff5f57"/>
  <circle cx="46" cy="22" r="6" fill="#febc2e"/>
  <circle cx="68" cy="22" r="6" fill="#28c840"/>
  <text x="430" y="26.5" text-anchor="middle" fill="#8b949e">fixmap plan — examples/tiny-auth-app</text>
  <rect class="cursor" x="526.1999999999999" y="67" width="8" height="15" fill="#74f0ba"/>
  <text class="l" style="animation-delay:0.40s" x="22" y="79" fill="#e6edf3"><tspan fill="#74f0ba" font-weight="bold">$ </tspan><tspan>npx @aryam/fixmap plan --issue "password reset emails fail"</tspan></text>
  <text class="l" style="animation-delay:2.20s" x="22" y="121" fill="#e6edf3"><tspan>FixMap found 1 context file and generated 2 test routes.</tspan></text>
  <text class="l" style="animation-delay:3.35s" x="22" y="163" fill="#e6edf3"><tspan fill="#74f0ba" font-weight="bold">## Context Files</tspan></text>
  <text class="l" style="animation-delay:3.60s" x="22" y="205" fill="#e6edf3"><tspan>- </tspan><tspan fill="#79c0ff">src/auth/reset-password.ts</tspan><tspan> (high confidence, score 16): path matches task terms: reset,</tspan></text>
  <text class="l" style="animation-delay:3.85s" x="22" y="226" fill="#e6edf3"><tspan>    password; content matches task terms: reset, password, email; auth-related task signal</tspan></text>
  <text class="l" style="animation-delay:5.00s" x="22" y="268" fill="#e6edf3"><tspan fill="#74f0ba" font-weight="bold">## Test Route</tspan></text>
  <text class="l" style="animation-delay:5.25s" x="22" y="310" fill="#e6edf3"><tspan>- </tspan><tspan fill="#79c0ff">npm run test</tspan><tspan>: repository root script named test. Related:</tspan></text>
  <text class="l" style="animation-delay:5.50s" x="22" y="331" fill="#e6edf3"><tspan>    </tspan><tspan fill="#79c0ff">test/auth/reset-password.test.ts</tspan><tspan>.</tspan></text>
  <text class="l" style="animation-delay:5.75s" x="22" y="352" fill="#e6edf3"><tspan>- </tspan><tspan fill="#79c0ff">npm run typecheck</tspan><tspan>: repository root script named typecheck. Related:</tspan></text>
  <text class="l" style="animation-delay:6.00s" x="22" y="373" fill="#e6edf3"><tspan>    </tspan><tspan fill="#79c0ff">src/auth/reset-password.ts</tspan><tspan>.</tspan></text>
  <text class="l" style="animation-delay:7.15s" x="22" y="415" fill="#e6edf3"><tspan fill="#74f0ba" font-weight="bold">## Risk Map</tspan></text>
  <text class="l" style="animation-delay:7.40s" x="22" y="457" fill="#e6edf3"><tspan>- </tspan><tspan fill="#ff7b72" font-weight="bold">high</tspan><tspan> authentication: authentication-related files are affected</tspan></text>
  <text class="l" style="animation-delay:8.55s" x="22" y="499" fill="#e6edf3"><tspan fill="#74f0ba" font-weight="bold">## Changed Files</tspan></text>
  <text class="l" style="animation-delay:8.80s" x="22" y="541" fill="#8b949e"><tspan>- None found</tspan></text>
  <text class="l" style="animation-delay:9.95s" x="22" y="583" fill="#e6edf3"><tspan fill="#74f0ba" font-weight="bold">## Diagnostics</tspan></text>
  <text class="l" style="animation-delay:10.20s" x="22" y="625" fill="#8b949e"><tspan>- None found</tspan></text>
</svg>
