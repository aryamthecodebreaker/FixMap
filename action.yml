name: FixMap
description: Map pull request changes to context files, test routes, and review risks.
inputs:
  issue:
    description: Issue, prompt, or review context for FixMap.
    required: false
  diff:
    description: Git diff spec, such as main...HEAD.
    required: false
  base:
    description: Base ref for diffing when diff is not provided.
    required: false
  head:
    description: Head ref for diffing when diff is not provided.
    required: false
  format:
    description: Output format.
    required: false
    default: markdown
  github-token:
    description: Token used to upsert a pull request comment. If neither this input nor GITHUB_TOKEN is set, FixMap only writes the step summary.
    required: false
  comment-author:
    description: GitHub login that owns prior FixMap comments. Defaults to github-actions[bot].
    required: false
outputs:
  report:
    description: The complete FixMap report in the selected format.
  context-count:
    description: Number of context files returned.
  test-route-count:
    description: Number of test routes returned.
branding:
  icon: map
  color: green
runs:
  using: node24
  main: packages/action/dist/index.mjs
